environment: development

server:
  host: "0.0.0.0"
  port: "8080"
  cors_origins:
    - "http://localhost:5173"
    - "http://localhost:3000"
  rate_limit_per_minute: 300

postgres:
  dsn: "host=localhost port=5434 user=postgres password=postgres dbname=burnrate sslmode=disable"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

security:
  api_key_pepper: "dev-pepper-change-in-production"
  api_key_cache_ttl_seconds: 300
